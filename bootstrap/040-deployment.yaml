apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance
  namespace: compliance-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compliance
  template:
    metadata:
      labels:
        app: compliance
    spec:
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: compliance
        - name: compliance-scripts
          configMap:
            name: compliance-scripts
      initContainers:
        - name: embed-index
          image: image-registry.openshift-image-registry.svc:5000/compliance-chatbot/compliance:latest
          command: ["python", "/scripts/embed.py"]
          volumeMounts:
            - name: shared-storage
              mountPath: /workspace/shared-storage
            - name: compliance-scripts
              mountPath: /scripts
      containers:
        - name: compliance
          image: image-registry.openshift-image-registry.svc:5000/compliance-chatbot/compliance:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: shared-storage
              mountPath: /workspace/shared-storage
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: OPENAI_API_KEY
              value: "local"
            - name: OPENAI_BASE_URL
              value: "https://granite.ai-example-single-model-serving.svc.cluster.local"
