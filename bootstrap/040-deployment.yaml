apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: compliance-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      containers:
        - name: chatbot
          image: image-registry.openshift-image-registry.svc:5000/compliance-chatbot/chatbot-image:latest
          ports:
            - containerPort: 8080